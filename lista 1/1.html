<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
 * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
   body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #d6ea66 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #input-group{
            text-align: center;
        }

        .h1{
          padding: 20px;

        }
 .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .btn-validar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2em;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
</style>

<body>

    <div class="container">
    <h1>validador de cpf</h1>
        <div class="input-group">
        <input type="text" id="cpfInput" placeholder="000.000.000.00" maxlength="14">
        </div>

        <button class="btnvalidar" onclick="validarcpf()">validar CPF</button>
        
        <div id="resultado" class="resultado"></div>
        <div id="debug" class="debug"></div>
    </div>
</body>
</html>
