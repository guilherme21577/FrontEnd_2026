<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Calculadora de Média Escolar</title>
    <style>
        /* CSS COMPLETO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            max-width: 550px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 2.5rem;
            font-size: 2.2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.7rem;
            color: #555;
            font-weight: bold;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .notas {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        #btnCalcular {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #btnCalcular:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        #btnCalcular:active {
            transform: translateY(-1px);
        }

        /* RESULTADO */
        .resultado {
            margin-top: 2.5rem;
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            animation: slideIn 0.6s ease-out;
        }

        .oculto {
            display: none;
        }

        @keyframes slideIn {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.95); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }

        /* CORES DAS SITUAÇÕES */
        .aprovado {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }

        .exame {
            background: linear-gradient(45deg, #FF9800, #F57C00);
            color: white;
        }

        .reprovado {
            background: linear-gradient(45deg, #f44336, #d32f2f);
            color: white;
        }

        #mediaResultado {
            font-size: 3rem;
            font-weight: bold;
            margin: 1.5rem 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        #nomeResultado {
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        #situacao h3 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 600px) {
            .notas {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            
            .container {
                padding: 2rem;
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- FORMULÁRIO -->
        <h1>🎓 Sistema Acadêmico</h1>
        
        <form id="formAluno">
            <!-- NOME -->
            <div class="input-group">
                <label for="nome">👤 Nome do Aluno:</label>
                <input type="text" id="nome" placeholder="Digite o nome completo" required>
            </div>
            
            <!-- NOTAS -->
            <div class="notas">
                <div class="input-group">
                    <label for="nota1">📝 Nota 1:</label>
                    <input type="number" id="nota1" min="0" max="10" step="0.1" placeholder="0.0 - 10.0" required>
                </div>
                <div class="input-group">
                    <label for="nota2">📝 Nota 2:</label>
                    <input type="number" id="nota2" min="0" max="10" step="0.1" placeholder="0.0 - 10.0" required>
                </div>
                <div class="input-group">
                    <label for="nota3">📝 Nota 3:</label>
                    <input type="number" id="nota3" min="0" max="10" step="0.1" placeholder="0.0 - 10.0" required>
                </div>
            </div>
            
            <!-- BOTÃO -->
            <button type="submit" id="btnCalcular">🚀 Calcular Média</button>
        </form>
        
        <!-- RESULTADO (inicialmente oculto) -->
        <div id="resultado" class="resultado oculto">
            <h2 id="nomeResultado"></h2>
            <p id="mediaResultado"></p>
            <div id="situacao"></div>
        </div>
    </div>

    <script>
        /* JAVASCRIPT COMPLETO */
        document.getElementById('formAluno').addEventListener('submit', function(event) {
            // 🔒 Impede reload da página
            event.preventDefault();
            
            // 📥 Captura e converte dados
            const nome = document.getElementById('nome').value;
            const nota1 = Number(document.getElementById('nota1').value);
            const nota2 = Number(document.getElementById('nota2').value);
            const nota3 = Number(document.getElementById('nota3').value);
            
            // 🧮 Calcula média
            const media = (nota1 + nota2 + nota3) / 3;
            
            // 📊 Exibe média formatada
            document.getElementById('mediaResultado').textContent = 
                `Média: ${media.toFixed(2)}`;
            
            // 👤 Exibe nome
            document.getElementById('nomeResultado').textContent = nome;
            
            // 🎨 Define situação e cor
            const situacaoDiv = document.getElementById('situacao');
            const resultadoDiv = document.getElementById('resultado');
             
            if (media >= 7.0) {
                // ✅ APROVADO
                situacaoDiv.innerHTML = `
                    <h3>🎉 APROVADO!</h3>
                    <p>🏆 Parabéns <strong>${nome}</strong>!<br>
                    Você foi aprovado com <strong>${media.toFixed(2)}</strong>!</p>
                `;
                resultadoDiv.className = 'resultado aprovado';
                
            } else if (media >= 4.0) {
                // 📚 EXAME
                const faltaPara10 = (10 - media).toFixed(2);
                situacaoDiv.innerHTML = `
                    <h3>📚 EM EXAME!</h3>
                    <p>⚠️ Faltam <strong>${faltaPara10}</strong> pontos para 10!<br>
                    Média atual: <strong>${media.toFixed(2)}</strong></p>
                `;
                resultadoDiv.className = 'resultado exame';
                
            } else {
                // ❌ REPROVADO
                situacaoDiv.innerHTML = `
                    <h3>❌ REPROVADO!</h3>
                    <p>📚 Estude mais na próxima, <strong>${nome}</strong>!<br>
                    Sua média foi <strong>${media.toFixed(2)}</strong></p>
                `;
                resultadoDiv.className = 'resultado reprovado';
            }
            
            // 👁️ Mostra resultado
            resultadoDiv.classList.remove('oculto');
            
            // 📱 Scroll suave para resultado
            resultadoDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
