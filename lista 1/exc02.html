<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Dinâmico de Temperatura</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 1.1em;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            font-size: 1.5em;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: scale(1.02);
        }

        .separator {
            font-size: 2em;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }

        .info {
            margin-top: 20px;
            padding: 15px;
            background: #e3f2fd;
            border-radius: 10px;
            border-left: 4px solid #2196f3;
            font-size: 0.9em;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌡️ Conversor de Temperatura</h1>
        
        <div class="input-group">
            <label for="celsius">°Celsius</label>
            <input type="number" id="celsius" step="0.1" placeholder="0.0">
        </div>

        <div class="separator">↔</div>

        <div class="input-group">
            <label for="fahrenheit">°Fahrenheit</label>
            <input type="number" id="fahrenheit" step="0.1" placeholder="32.0">
        </div>

        <div class="info">
            💡 Digite em qualquer campo e veja a conversão acontecer em tempo real!
        </div>
    </div>

    <script>
        // Elementos do DOM
        const celsiusInput = document.getElementById('celsius');
        const fahrenheitInput = document.getElementById('fahrenheit');

        // Função para converter Celsius para Fahrenheit
        function celsiusToFahrenheit(celsius) {
            return (celsius * 9/5) + 32;
        }

        // Função para converter Fahrenheit para Celsius
        function fahrenheitToCelsius(fahrenheit) {
            return (fahrenheit - 32) * 5/9;
        }

        // Função para formatar com 2 casas decimais
        function formatNumber(num) {
            return parseFloat(num).toFixed(2);
        }

        // Event listener para input de Celsius
        celsiusInput.addEventListener('input', function() {
            const celsiusValue = parseFloat(this.value);
            
            if (!isNaN(celsiusValue)) {
                const fahrenheitValue = celsiusToFahrenheit(celsiusValue);
                fahrenheitInput.value = formatNumber(fahrenheitValue);
            } else {
                fahrenheitInput.value = '';
            }
        });

        // Event listener para input de Fahrenheit
        fahrenheitInput.addEventListener('input', function() {
            const fahrenheitValue = parseFloat(this.value);
            
            if (!isNaN(fahrenheitValue)) {
                const celsiusValue = fahrenheitToCelsius(fahrenheitValue);
                celsiusInput.value = formatNumber(celsiusValue);
            } else {
                celsiusInput.value = '';
            }
        });

        // Prevenir input inválido (letras)
        [celsiusInput, fahrenheitInput].forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === '-' && this.selectionStart === 0) return;
                if (!/[0-9.]/.test(e.key) && e.key !== 'Backspace' && e.key !== 'Delete' && e.key !== 'Tab') {
                    e.preventDefault();
                }
            });
        });
    </script>
</body>
</html>
